# Med Slots — lokalne środowisko MVP (PostgreSQL + PHP + Node)
# Backend: obraz php:8.4-fpm; w dev HTTP na :8000, document root Symfony: public/

services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: telemedi
      POSTGRES_USER: telemedi
      POSTGRES_PASSWORD: telemedi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemedi -d telemedi"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: med-slots-monorepo-backend:dev
    working_dir: /var/www/html
    ports:
      # Gdy 8000 jest zajęty na hoście: BACKEND_PORT=8010 docker compose up -d backend
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      DATABASE_URL: postgresql://telemedi:telemedi@database:5432/telemedi?serverVersion=16&charset=utf8
    depends_on:
      database:
        condition: service_healthy
    command:
      - php
      - -S
      - 0.0.0.0:8000
      - -t
      - public

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      # Gdy 3000 jest zajęty: FRONTEND_PORT=3010 docker compose up -d frontend
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
    tty: true
    stdin_open: true
    command: ["npm", "run", "dev"]

volumes:
  postgres_data:
