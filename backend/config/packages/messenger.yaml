framework:
    messenger:
        failure_transport: failed

        transports:
            sync: 'sync://'
            async: 'in-memory://'
            failed: 'in-memory://'

        routing:
            App\Booking\Command\BookSlotCommand: sync
            # Process immediately without a worker; switch to `async` in production and run `messenger:consume async`.
            App\Booking\Event\SlotBookedEvent: sync
