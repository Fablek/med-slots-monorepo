nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin:
            # Regex from env (localhost / 127.0.0.1, any port) + explicit dev frontend (Vite on :3010)
            - '%env(CORS_ALLOW_ORIGIN)%'
            - '^https?://localhost:3010$'
            - '^https?://127\.0\.0\.1:3010$'
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'Accept', 'Origin', 'X-Requested-With']
        expose_headers: ['Link', 'Location', 'Content-Type']
        max_age: 3600
    paths:
        '^/': null
